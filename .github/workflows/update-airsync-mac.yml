name: Update AirSync macOS

on:
  schedule:
    # Run every day at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest Hayase release
        id: release
        run: |
          CURRENT_VERSION=$(grep '^[[:space:]]*version' Casks/airsync-mac.rb | sed -E 's/.*version "([^"]+)".*/\1/')
          LATEST_VERSION=$(curl -s "https://api.github.com/repos/sameerasw/airsync-mac/tags" | jq -r '.[0].name' | sed 's/^v//')
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/sameerasw/airsync-mac/releases/tags/v$LATEST_VERSION | jq -r '.assets[] | select(.name == "AirSync.dmg") | .browser_download_url')

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

          echo "Current version: $CURRENT_VERSION"
          echo "Latest version: $LATEST_VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Check if update is needed
        id: check
        run: |
          if [ "${{ steps.release.outputs.latest_version }}" != "${{ steps.release.outputs.current_version }}" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Update needed: ${{ steps.release.outputs.current_version }} -> ${{ steps.release.outputs.latest_version }}"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "No update needed"
          fi

      - uses: fregante/setup-git-user@v2
        if: steps.check.outputs.update_needed == 'true'

      - uses: Homebrew/actions/setup-homebrew@main
        if: steps.check.outputs.update_needed == 'true'
        with:
          homebrew-core: true
          homebrew-cask: true

      - name: Download and calculate SHA256
        if: steps.check.outputs.update_needed == 'true'
        id: sha256
        run: |
          # Download the DMG and calculate SHA256
          curl -sL "${{ steps.release.outputs.download_url }}" -o AirSync.dmg
          SHA256=$(sha256sum AirSync.dmg | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
          rm AirSync.dmg

      - name: Update Cask file
        if: steps.check.outputs.update_needed == 'true'
        run: |
          # Update version
          sed -i 's/version "[^"]*"/version "${{ steps.release.outputs.latest_version }}"/' Casks/airsync-mac.rb

          # Update SHA256
          sed -i 's/sha256 "[^"]*"/sha256 "${{ steps.sha256.outputs.sha256 }}"/' Casks/airsync-mac.rb

      - name: Test the updated Cask
        if: steps.check.outputs.update_needed == 'true'
        run: |
          # Add this tap and test the Cask
          brew tap ${{ github.repository }}
          brew install --cask --dry-run airsync-mac

      - name: Commit and push changes
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git add Casks/airsync-mac.rb
          git commit -m "chore: update AirSync to v${{ steps.release.outputs.latest_version }}"
          git push
